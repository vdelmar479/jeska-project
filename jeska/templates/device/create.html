{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}New Device{% endblock %}</h1>
{% endblock %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <form method="post">
              <div class="mb-3">
                <label for="name" class="form-label">Device Name</label>
                <input name="name" id="name" class="form-control" value="{{ request.form['name'] }}" required>
              </div>
              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea name="description" id="description" class="form-control">{{ request.form['description'] }}</textarea>
              </div>
              <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select name="status" id="status" class="form-select" required>
                  <option value="Available">Available</option>
                  <option value="In Use">In Use</option>
                  <option value="Maintenance">Maintenance</option>
                  <option value="Retired">Retired</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="components" class="form-label">Components</label>
                <textarea name="components" id="components" class="form-control">{{ request.form['components'] }}</textarea>
              </div>
              <div class="mb-3">
                <label for="peripherals" class="form-label">Peripherals</label>
                <textarea name="peripherals" id="peripherals" class="form-control">{{ request.form['peripherals'] }}</textarea>
              </div>
              <div class="mb-3">
                <label for="location" class="form-label">Location</label>
                <input name="location" id="location" class="form-control" value="{{ request.form['location'] }}" required>
              </div>
              <div class="d-flex justify-content-center mt-4">
                <button type="submit" class="btn btn-primary w-50">Save</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
