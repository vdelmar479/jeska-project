{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Update Profile{% endblock %}</h1>
{% endblock %}

{% block content %}
  <div class="profile-container">
    <form method="post" class="profile-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" value="{{ g.user['username'] }}" disabled>
        <small class="form-text">Username cannot be changed</small>
      </div>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" value="{{ g.user['name'] or '' }}">
      </div>

      <div class="form-group">
        <label for="surname">Surname</label>
        <input type="text" name="surname" id="surname" value="{{ g.user['surname'] or '' }}">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ g.user['email'] or '' }}">
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <input type="text" id="role" value="{{ g.user['role'] }}" disabled>
        <small class="form-text">Role cannot be changed</small>
      </div>

      <div class="form-actions">
        <input type="submit" value="Save Changes" class="btn-primary">
        <a href="{{ url_for('auth.profile') }}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
