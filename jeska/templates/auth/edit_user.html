{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Edit User{% endblock %}</h1>
{% endblock %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <form method="post">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" value="{{ user['username'] }}" disabled>
              </div>
              
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ user['name'] }}" required>
              </div>
              
              <div class="mb-3">
                <label for="surname" class="form-label">Surname</label>
                <input type="text" class="form-control" id="surname" name="surname" value="{{ user['surname'] }}" required>
              </div>
              
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ user['email'] }}" required>
              </div>
              
              <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select class="form-select" id="role" name="role">
                  <option value="user" {% if user['role'] == 'user' %}selected{% endif %}>User</option>
                  <option value="admin" {% if user['role'] == 'admin' %}selected{% endif %}>Admin</option>
                </select>
              </div>
              
              <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary w-50">Save Changes</button>
                <a href="{{ url_for('auth.list_users') }}" class="btn btn-secondary w-50">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
